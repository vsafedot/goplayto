version: '3.9'

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       playto
      POSTGRES_USER:     playto
      POSTGRES_PASSWORD: playto
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U playto"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Django backend ────────────────────────────────────────────────────
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DJANGO_DEBUG:      "False"
      DJANGO_SECRET_KEY: "change-me-in-production"
      POSTGRES_HOST:     db
      POSTGRES_DB:       playto
      POSTGRES_USER:     playto
      POSTGRES_PASSWORD: playto
      REDIS_URL:         redis://redis:6379/0
      ALLOWED_HOSTS:     "*"
    depends_on:
      db:    { condition: service_healthy }
      redis: { condition: service_healthy }
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_data &&
             gunicorn playto.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60"

  # ── Celery worker ─────────────────────────────────────────────────────
  celery-worker:
    build: ./backend
    restart: unless-stopped
    environment:
      DJANGO_DEBUG:      "False"
      DJANGO_SECRET_KEY: "change-me-in-production"
      POSTGRES_HOST:     db
      POSTGRES_DB:       playto
      POSTGRES_USER:     playto
      POSTGRES_PASSWORD: playto
      REDIS_URL:         redis://redis:6379/0
    depends_on:
      db:      { condition: service_healthy }
      redis:   { condition: service_healthy }
      backend: { condition: service_started }
    command: celery -A playto worker --loglevel=info --concurrency=4

  # ── Celery beat scheduler ─────────────────────────────────────────────
  celery-beat:
    build: ./backend
    restart: unless-stopped
    environment:
      DJANGO_DEBUG:      "False"
      DJANGO_SECRET_KEY: "change-me-in-production"
      POSTGRES_HOST:     db
      POSTGRES_DB:       playto
      POSTGRES_USER:     playto
      POSTGRES_PASSWORD: playto
      REDIS_URL:         redis://redis:6379/0
    depends_on:
      db:            { condition: service_healthy }
      redis:         { condition: service_healthy }
      celery-worker: { condition: service_started }
    command: celery -A playto beat --loglevel=info

  # ── React frontend ────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
